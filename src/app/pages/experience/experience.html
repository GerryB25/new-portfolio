<div class="experience-bg section-pad bg-slate-950 min-h-dvh py-12 text-slate-300">
    <div class="max-w-4xl mx-auto flex flex-col gap-10">

        <!-- Encabezado -->
        <div class="flex flex-col gap-3">
            <app-icon-label text="Experiencia" icon="work_history" />
        </div>

        <!-- Línea de tiempo -->
        <div class="flex flex-col">
            @for (exp of experiences; track exp.company; let last = $last) {
                <div class="flex gap-5">

                    <!-- Riel: punto + línea -->
                    <div class="flex flex-col items-center">
                        <span class="mt-1.5 h-4 w-4 shrink-0 rounded-full ring-4 ring-slate-950"
                              [class]="exp.current ? 'bg-tertiary' : 'bg-slate-600'"></span>
                        @if (!last) {
                            <span class="my-2 w-0.5 flex-1 bg-slate-700"></span>
                        }
                    </div>

                    <!-- Contenido -->
                    <div class="flex-1" [class.pb-12]="!last">
                        <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 flex flex-col gap-4">

                            <div class="flex flex-col gap-1">
                                <div class="flex flex-wrap items-center gap-2">
                                    <h3 class="text-lg font-bold text-white">{{ exp.role }}</h3>
                                    @if (exp.current) {
                                        <span class="rounded-full border border-tertiary px-2 py-0.5 text-xs font-semibold text-tertiary">Actual</span>
                                    }
                                </div>
                                <span class="font-semibold text-secondary">{{ exp.company }}</span>
                                <div class="flex flex-wrap items-center gap-x-2 text-sm text-slate-400">
                                    <span>{{ exp.period }}</span>
                                </div>
                            </div>

                            <p class="italic text-slate-400">{{ exp.description }}</p>

                            <ul class="flex flex-col gap-2.5">
                                @for (achievement of exp.achievements; track achievement) {
                                    <li class="flex gap-3 text-sm leading-relaxed text-slate-300">
                                        <span class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-secondary"></span>
                                        <span>{{ achievement }}</span>
                                    </li>
                                }
                            </ul>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
